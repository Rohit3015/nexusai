<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusAI — Your Intelligent Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #7c6fff;
    --accent2: #a78bfa;
    --accent-glow: rgba(124,111,255,0.15);
    --text: #f0efff;
    --text2: #8b8ba8;
    --text3: #5a5a72;
    --user-bubble: #1e1b3a;
    --user-border: rgba(124,111,255,0.3);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,111,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,111,255,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 60px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .logo-icon::before {
    content: ''; width: 14px; height: 14px;
    border: 2px solid white; border-radius: 50%; display: block;
  }
  .logo-icon::after {
    content: ''; position: absolute;
    width: 6px; height: 6px; background: white;
    border-radius: 50%; bottom: 6px; right: 6px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700;
    color: var(--text); letter-spacing: -0.3px;
  }
  .logo-text span { color: var(--accent2); }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    background: rgba(124,111,255,0.1);
    border: 1px solid rgba(124,111,255,0.2);
    font-size: 12px; color: var(--accent2); font-weight: 500;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80; animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .btn-new {
    padding: 6px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: transparent;
    color: var(--text2); font-size: 13px;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
  }
  .btn-new:hover { background: var(--surface2); color: var(--text); }

  .layout { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }

  .sidebar {
    width: 240px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column;
    padding: 16px 12px; gap: 6px; overflow-y: auto;
  }
  .sidebar-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text3);
    padding: 8px 8px 4px; font-weight: 500;
  }
  .sidebar-item {
    padding: 8px 10px; border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text2); cursor: pointer;
    transition: all 0.12s; border: 1px solid transparent;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active {
    background: var(--accent-glow); color: var(--accent2);
    border-color: rgba(124,111,255,0.2);
  }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  #messages { flex: 1; overflow-y: auto; padding: 32px 0; scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .messages-inner {
    max-width: 720px; margin: 0 auto;
    padding: 0 24px;
    display: flex; flex-direction: column; gap: 24px;
  }

  .welcome {
    text-align: center; padding: 60px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .welcome-icon {
    width: 64px; height: 64px; border-radius: 16px;
    background: var(--accent-glow);
    border: 1px solid rgba(124,111,255,0.3);
    display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
  }
  .welcome-icon svg { width: 28px; height: 28px; color: var(--accent2); }
  .welcome h1 {
    font-family: 'Syne', sans-serif; font-size: 28px;
    font-weight: 700; color: var(--text); letter-spacing: -0.5px;
  }
  .welcome p { font-size: 15px; color: var(--text2); max-width: 380px; line-height: 1.6; }

  .suggestions {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 16px; width: 100%; max-width: 480px;
  }
  .suggestion {
    padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface);
    font-size: 13px; color: var(--text2); cursor: pointer;
    text-align: left; transition: all 0.15s; line-height: 1.4;
    font-family: 'Inter', sans-serif;
  }
  .suggestion:hover { background: var(--surface2); border-color: rgba(124,111,255,0.3); color: var(--text); }

  .msg-row { display: flex; gap: 14px; align-items: flex-start; }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; margin-top: 2px;
  }
  .avatar.ai { background: var(--accent); color: white; font-family: 'Syne', sans-serif; }
  .avatar.user { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); font-size: 11px; }

  .bubble {
    max-width: 78%; padding: 12px 16px; border-radius: var(--radius);
    font-size: 14.5px; line-height: 1.7; white-space: pre-wrap; word-break: break-word;
  }
  .msg-row.ai .bubble {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
  }
  .msg-row.user .bubble {
    background: var(--user-bubble); border: 1px solid var(--user-border); color: var(--text);
    border-radius: var(--radius) 4px var(--radius) var(--radius);
  }

  .typing-row { display: flex; gap: 14px; align-items: flex-start; }
  .typing-bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    padding: 14px 18px; display: flex; gap: 5px; align-items: center;
  }
  .typing-bubble span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text3); animation: bounce 1.3s ease-in-out infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); background: var(--text3); }
    30% { transform: translateY(-5px); background: var(--accent2); }
  }

  .input-area {
    flex-shrink: 0; padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.6); backdrop-filter: blur(20px);
  }
  .input-inner { max-width: 720px; margin: 0 auto; position: relative; }
  .input-box {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border2); border-radius: var(--radius);
    padding: 14px 56px 14px 18px; font-size: 14.5px;
    font-family: 'Inter', sans-serif; color: var(--text);
    resize: none; outline: none; min-height: 52px; max-height: 160px;
    line-height: 1.6; transition: border-color 0.15s; overflow-y: auto;
  }
  .input-box::placeholder { color: var(--text3); }
  .input-box:focus { border-color: rgba(124,111,255,0.5); }

  .send-btn {
    position: absolute; right: 10px; bottom: 10px;
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .send-btn:hover { background: #6c5eef; transform: scale(1.04); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 17px; height: 17px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .input-footer { text-align: center; font-size: 11px; color: var(--text3); margin-top: 8px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg-row, .typing-row { animation: fadeUp 0.2s ease; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    .messages-inner { padding: 0 16px; }
    .input-area { padding: 12px 16px 16px; }
    .suggestions { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">Nexus<span>AI</span></div>
  </div>
  <div class="header-right">
    <div class="status-pill"><div class="status-dot"></div>Online</div>
    <button class="btn-new" onclick="newChat()">+ New chat</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">Recent</div>
    <div class="sidebar-item active" id="current-chat">New conversation</div>
    <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--border);">
      <div class="sidebar-label" style="margin-bottom:6px;">Powered by</div>
      <div class="sidebar-item" style="cursor:default;font-size:12px;">Gemini (Google)</div>
    </div>
  </aside>

  <main class="main">
    <div id="messages">
      <div class="messages-inner" id="messages-inner">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </div>
          <h1>What can I help you with?</h1>
          <p>Ask anything — I'm your AI assistant, available 24/7 and ready to help.</p>
          <div class="suggestions">
            <button class="suggestion" onclick="suggest('Write a professional email to my team')">Write a professional email to my team</button>
            <button class="suggestion" onclick="suggest('Explain quantum computing simply')">Explain quantum computing simply</button>
            <button class="suggestion" onclick="suggest('Help me debug my Python code')">Help me debug my Python code</button>
            <button class="suggestion" onclick="suggest('Generate a business plan outline')">Generate a business plan outline</button>
          </div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-inner">
        <textarea id="user-input" class="input-box" placeholder="Message NexusAI..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <p class="input-footer">NexusAI may make mistakes. Verify important information.</p>
    </div>
  </main>
</div>

<script>
// ===== PASTE YOUR GEMINI API KEY BELOW =====
const GEMINI_API_KEY = 'GEMINI_API_KEY';
// ===========================================

const SYSTEM_PROMPT = 'You are NexusAI, a helpful, knowledgeable, and friendly AI assistant. You are direct, clear, and concise. You help users with any task — writing, coding, analysis, brainstorming, and more. Always be warm and professional.';

let history = [];
let isLoading = false;
let msgCount = 0;

const messagesEl = document.getElementById('messages');
const innerEl = document.getElementById('messages-inner');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

function suggest(text) { inputEl.value = text; sendMessage(); }

function addMessage(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'user' ? 'You' : 'N';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;
  row.appendChild(av);
  row.appendChild(bub);
  innerEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  msgCount++;
  if (msgCount === 1) {
    document.getElementById('current-chat').textContent = text.substring(0, 28) + (text.length > 28 ? '…' : '');
  }
  return bub;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar ai'; av.textContent = 'N';
  const bub = document.createElement('div');
  bub.className = 'typing-bubble';
  bub.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(av); row.appendChild(bub);
  innerEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function sendMessage() {
  if (isLoading) return;
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;
  addMessage('user', text);
  history.push({ role: 'user', parts: [{ text }] });
  showTyping();

  try {
    const res = await fetch(
  `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: history
        })
      }
    );
    const data = await res.json();
    removeTyping();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I could not get a response.';
    addMessage('ai', reply);
    history.push({ role: 'model', parts: [{ text: reply }] });
  } catch (err) {
    removeTyping();
    addMessage('ai', 'Network error. Please check your connection and try again.');
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function newChat() {
  history = []; msgCount = 0;
  innerEl.innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      </div>
      <h1>What can I help you with?</h1>
      <p>Ask anything — I'm your AI assistant, available 24/7 and ready to help.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="suggest('Write a professional email to my team')">Write a professional email to my team</button>
        <button class="suggestion" onclick="suggest('Explain quantum computing simply')">Explain quantum computing simply</button>
        <button class="suggestion" onclick="suggest('Help me debug my Python code')">Help me debug my Python code</button>
        <button class="suggestion" onclick="suggest('Generate a business plan outline')">Generate a business plan outline</button>
      </div>
    </div>`;
  document.getElementById('current-chat').textContent = 'New conversation';
}
</script>
</body>
</html>
